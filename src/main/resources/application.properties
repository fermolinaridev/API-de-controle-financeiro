spring.application.name=financas
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.jwt.secret=${JWT_SECRET:troque-essa-chave-em-producao-com-pelo-menos-32-bytes-aleatorios}
app.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:60}
app.jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}

# Cotações — funcionam SEM CADASTRO: busca/preço de ações pela brapi (/quote/list),
# dólar/BTC pela AwesomeAPI e gráfico pelo Yahoo Finance. O BRAPI_TOKEN é opcional
# (só eleva o rate-limit da brapi); deixe vazio que tudo funciona.
app.brapi.base-url=${BRAPI_BASE_URL:https://brapi.dev/api}
app.brapi.token=${BRAPI_TOKEN:}
