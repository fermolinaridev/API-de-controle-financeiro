spring.application.name=financas
spring.profiles.active=dev

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

app.jwt.secret=${JWT_SECRET:troque-essa-chave-em-producao-com-pelo-menos-32-bytes-aleatorios}
app.jwt.access-token-minutes=${JWT_ACCESS_MINUTES:60}
app.jwt.refresh-token-days=${JWT_REFRESH_DAYS:7}
