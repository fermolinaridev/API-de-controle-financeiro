services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: financas
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas
    ports:
      - "5432:5432"
    volumes:
      - financas_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://db:5432/financas
      DB_USERNAME: financas
      DB_PASSWORD: financas
      # secret de demonstração para rodar localmente; em produção real defina JWT_SECRET no ambiente
      JWT_SECRET: ${JWT_SECRET:-demo-local-financas-2026-nao-usar-em-producao-9f8e7d6c5b4a}
      # opcional: token da brapi.dev só eleva o rate-limit; as cotações funcionam sem ele
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  financas_db:
